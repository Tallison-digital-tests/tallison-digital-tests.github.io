<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restrict Access</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #252525; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center; }
        input { padding: 10px; width: 200px; border: none; border-radius: 4px; margin-bottom: 10px; }
        button { padding: 10px 20px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h3>Internal Acces</h3>
        <input type="password" id="password" placeholder="Password">
        <br>
        <button onclick="checkAccess()">Enter</button>
        <p id="error" style="color: #ff5555; display: none;">Acess Denied.</p>
    </div>

    <script>
        const targetHash = "3cf6703dff4bac11f59d557a16ba146beca7f296a6c5e2ca240ec65d6f194bd8"; 
        const encryptedUrl = [85, 152, 20, 88, 135, 100, 192, 101, 133, 179, 61, 14, 123, 214];

        async function checkAccess() {
            const pass = document.getElementById('password').value;
            const encoder = new TextEncoder();
            
            const hashBuffer = await crypto.subtle.digest('SHA-256', encoder.encode(pass));
            const hashArray = new Uint8Array(hashBuffer);
            const inputHashHex = Array.from(hashArray).map(b => b.toString(16).padStart(2, '0')).join('');
            

            if (inputHashHex === targetHash) {
                let decryptedUrl = "";
                for (let i = 0; i < encryptedUrl.length; i++) {
                    decryptedUrl += String.fromCharCode(encryptedUrl[i] ^ hashArray[i % hashArray.length]);
                }

                window.location.href = decryptedUrl;
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }

        document.getElementById("password").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                checkAccess();
            }
        });
    </script>
</body>
</html>
